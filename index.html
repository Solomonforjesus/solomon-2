<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solomon For Jesus</title>

  <style>
    :root {
      --bg-light: #f7f4ec;
      --bg-warm: #e7dfcf;
      --ink-dark: #1f2933;
      --ink-soft: #4b5563;
      --solomon-brown: #7c2d12;
      --solomon-brown-dark: #5f210d;
      --gold-soft: #c9a24d;
      --card: #ffffff;
      --border-soft: #ded6c8;
      --chat-bg: #fbfaf7;
      --shadow: 0 18px 45px rgba(47, 36, 24, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(201, 162, 77, 0.22), transparent 32%),
        linear-gradient(135deg, var(--bg-light), var(--bg-warm));
      color: var(--ink-dark);
    }

    .page {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: clamp(22px, 4vw, 48px) clamp(16px, 4vw, 32px);
    }

    .site-header {
      margin-bottom: clamp(22px, 4vw, 34px);
    }

    .site-title {
      margin: 0;
      color: #2f2418;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(38px, 6vw, 72px);
      line-height: 1;
      letter-spacing: -0.04em;
      text-align: left;
    }

    .site-subtitle {
      max-width: 760px;
      margin: 12px 0 0 4px;
      color: var(--ink-soft);
      font-size: clamp(17px, 2vw, 21px);
      line-height: 1.55;
    }

    .main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 1fr);
      gap: clamp(20px, 4vw, 34px);
      align-items: stretch;
    }

   .chat-box {
  min-width: 0;
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid rgba(222, 214, 200, 0.95);
  border-radius: 22px;
  box-shadow: var(--shadow);
  overflow: hidden;
}

.image-panel {
  min-width: 0;
}
    .chat-box {
      display: flex;
      flex-direction: column;
      padding: clamp(18px, 3vw, 28px);
    }

    .chat-heading {
      margin: 0 0 14px 0;
      color: var(--solomon-brown);
      font-size: clamp(23px, 2.5vw, 30px);
      line-height: 1.15;
      font-family: Georgia, "Times New Roman", serif;
    }

    .messages {
      flex: 1;
      min-height: clamp(330px, 48vh, 560px);
      max-height: 620px;
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: clamp(15px, 2.4vw, 20px);
      margin-bottom: 16px;
      background: var(--chat-bg);
      overflow-y: auto;
      scroll-behavior: smooth;
      font-size: clamp(17px, 1.8vw, 19px);
      line-height: 1.6;
    }

    .message {
      margin-bottom: 16px;
      overflow-wrap: anywhere;
    }

    .user {
      font-weight: 700;
      color: #1d4ed8;
    }

    .solomon {
      font-weight: 700;
      color: var(--solomon-brown);
    }

    textarea {
      width: 100%;
      min-height: 112px;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid #b9afa1;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(17px, 1.8vw, 19px);
      line-height: 1.45;
      background: #ffffff;
      color: var(--ink-dark);
      resize: vertical;
    }

    textarea:focus {
      outline: 3px solid rgba(201, 162, 77, 0.38);
      border-color: var(--gold-soft);
    }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 15px 18px;
      font-size: clamp(18px, 2vw, 21px);
      font-weight: 700;
      border: none;
      border-radius: 14px;
      background: var(--solomon-brown);
      color: white;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease;
    }

    button:hover {
      background: var(--solomon-brown-dark);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

   .secondary-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 14px;
}

.secondary-buttons button {
  margin-top: 0;
  padding: 12px 14px;
  font-size: clamp(15px, 1.7vw, 17px);
}

   .image-panel {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  background: transparent;
  padding: 0;
}
    .solomon-image {
      width: 100%;
      max-width: 560px;
      height: auto;
      max-height: 680px;
      object-fit: contain;
      display: block;
      border-radius: 14px;
    }

    @media (max-width: 860px) {
      .site-title,
      .site-subtitle {
        text-align: center;
        margin-left: auto;
        margin-right: auto;
      }

      .main-layout {
        grid-template-columns: 1fr;
      }

      .chat-box {
        order: 1;
      }

      .image-panel {
        order: 2;
      }

      .solomon-image {
        width: 100%;
        max-width: 520px;
        height: auto;
        max-height: none;
        object-fit: contain;
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 20px 12px;
      }

      .chat-box,
      .image-panel {
        border-radius: 18px;
      }

      .messages {
        min-height: 300px;
      }

      textarea {
        min-height: 105px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="site-header">
      <h1 class="site-title">Solomon For Jesus</h1>
      <p class="site-subtitle">
        A Christian wisdom assistant designed to answer with clarity, humility,
        truth, and faithfulness to the Gospel of Jesus Christ.
      </p>
    </header>

    <main class="main-layout">
      <section class="chat-box" aria-label="Solomon chat interface">
        <h2 class="chat-heading">Ask Solomon</h2>

        <div class="messages" id="messages">
          <div class="message">
            <span class="solomon">Solomon:</span>
            Welcome. Ask your question, and I will do my best to answer with wisdom, honesty, and biblical faithfulness.
          </div>
        </div>

        <textarea id="userInput" placeholder="Type your question here..."></textarea>
        <button onclick="sendMessage()">Ask Solomon</button>

        <div class="secondary-buttons">
  <button type="button" onclick="startPrayerRequest()">Prayer Request</button>
  <button type="button" onclick="emailPastor()">Email the Pastor</button>
</div>
      </section>

      <aside class="image-panel" aria-label="Solomon For Jesus artwork">
        <img
         src="ChatGPT%20Image%20Jun%2027,%202026,%2010_49_48%20AM.png"
          alt="Solomon For Jesus artwork with John 14:6"
          class="solomon-image"
        />
      </aside>
    </main>
  </div>

  
    <script>
    function startPrayerRequest() {
      const input = document.getElementById("userInput");
      input.value = "Prayer request: ";
      input.focus();
    }

    function emailPastor() {
      window.location.href = "mailto:contact@solomonforjesus.com?subject=Prayer%20Request%20or%20Pastoral%20Contact";
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const messages = document.getElementById("messages");
      const text = input.value.trim();
    
   

      if (!text) return;

      const userMessage = document.createElement("div");
      userMessage.className = "message";
      userMessage.innerHTML = `<span class="user">You:</span> ${text}`;
      messages.appendChild(userMessage);

      input.value = "";

      const solomonMessage = document.createElement("div");
      solomonMessage.className = "message";
      solomonMessage.innerHTML = `<span class="solomon">Solomon:</span> Thinking...`;
      messages.appendChild(solomonMessage);

      messages.scrollTop = messages.scrollHeight;

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();

        if (data.reply) {
          solomonMessage.innerHTML = `<span class="solomon">Solomon:</span> ${data.reply}`;
        } else {
          solomonMessage.innerHTML = `<span class="solomon">Solomon:</span> ${data.error || "I could not answer that yet. Please try again."}`;
        }
      } catch (error) {
        solomonMessage.innerHTML = `<span class="solomon">Solomon:</span> Something went wrong. Please try again.`;
      }

      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
